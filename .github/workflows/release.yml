name: Keystead client release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: keystead-windows
            gradle: .\gradlew.bat
          - os: macos-latest
            artifact: keystead-macos
            gradle: ./gradlew
          - os: ubuntu-latest
            artifact: keystead-linux
            gradle: ./gradlew
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: keystead-client
      - uses: actions/checkout@v4
        with:
          repository: MidCoard/keystead
          path: keystead
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - name: Package native distribution
        working-directory: keystead-client
        run: ${{ matrix.gradle }} packageDistributionForCurrentOS --no-daemon
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: keystead-client/build/compose/binaries/**/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Attach installers to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
